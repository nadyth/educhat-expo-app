steps:
  # Download keystore and env from GCS
  - name: 'us-central1-docker.pkg.dev/nadeem-personal/cloud-run-source-deploy/androidsdk:l1'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p keystores
        gsutil cp gs://nadeem-personal/edu-chat-android-app/keystores/release.keystore keystores/release.keystore
        gsutil cp gs://nadeem-personal/edu-chat-android-app/env/.env.production .env.production

  # Install npm dependencies
  - name: 'us-central1-docker.pkg.dev/nadeem-personal/cloud-run-source-deploy/androidsdk:l1'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install
    env:
      - 'APP_ENV=production'

  # Generate Android native project
  - name: 'us-central1-docker.pkg.dev/nadeem-personal/cloud-run-source-deploy/androidsdk:l1'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npx expo prebuild --platform android
    env:
      - 'APP_ENV=production'

  # Build release AAB
  - name: 'us-central1-docker.pkg.dev/nadeem-personal/cloud-run-source-deploy/androidsdk:l1'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd android && ./gradlew bundleRelease
    env:
      - 'APP_ENV=production'

  # Upload AAB to GCS bucket
  - name: 'us-central1-docker.pkg.dev/nadeem-personal/cloud-run-source-deploy/androidsdk:l1'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TIMESTAMP=$$(date +%Y%m%d-%H%M%S)
        gsutil cp android/app/build/outputs/bundle/release/app-release.aab \
          gs://nadeem-public-gcs/edu-chat/builds/app-release-$${TIMESTAMP}.aab

options:
  logging: CLOUD_LOGGING_ONLY